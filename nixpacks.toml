[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@9", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/livechat-admin run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
